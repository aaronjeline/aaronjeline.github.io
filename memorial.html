<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0;url=https://jeff-memorial-travel.netlify.app/">
<title>Where We Travelled</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #1a1712;
    color: #e8dfd2;
    font-family: 'Nunito Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 40px 24px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: #c4a265;
    letter-spacing: 0.03em;
    margin-bottom: 10px;
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    color: #a09482;
    letter-spacing: 0.05em;
    margin-bottom: 36px;
  }
  .redirecting {
    font-size: 14px;
    color: #6b5f4f;
    font-weight: 300;
    margin-bottom: 20px;
  }
  a.link-btn {
    display: inline-block;
    padding: 12px 28px;
    background: #c4a265;
    color: #1a1712;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    transition: background 0.2s;
  }
  a.link-btn:hover { background: #dbc08a; }
</style>
<script>
  setTimeout(function() {
    window.location.href = "https://jeff-memorial-travel.netlify.app/";
  }, 500);
</script>
</head>
<body>
<div class="container">
  <h1>Where We Travelled</h1>
  <p class="subtitle">A map of journeys shared &amp; remembered</p>
  <p class="redirecting">Redirecting you now&hellip;</p>
  <a class="link-btn" href="https://jeff-memorial-travel.netlify.app/">Click here if you are not redirected</a>
</div>
</body>
</html>
